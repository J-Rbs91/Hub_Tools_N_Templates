name: Sécurité

# Analyse de sécurité : CodeQL (JS embarqué dans les pages) + détection de secrets.

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "17 3 * * 1"
  workflow_dispatch:

permissions:
  contents: read

# Économie de minutes Actions : un nouveau push sur la même réf annule le run en cours.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  codeql:
    name: CodeQL
    runs-on: ubuntu-latest
    # CodeQL (job le plus coûteux) ne tourne pas sur les push : il reste couvert par
    # les PR, le planning hebdomadaire et le déclenchement manuel. La détection de
    # secrets (job « secrets »), peu coûteuse, reste exécutée sur chaque push.
    if: github.event_name != 'push'
    permissions:
      contents: read
      security-events: write
      actions: read
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: javascript-typescript
      - name: Analyze
        uses: github/codeql-action/analyze@v4

  secrets:
    name: Détection de secrets
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: gitleaks
        uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e # v3.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
