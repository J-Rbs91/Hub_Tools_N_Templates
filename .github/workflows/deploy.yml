name: Deploy GitHub Pages

# Déploiement Pages piloté par GitHub Actions (actions de dernière génération).
# Remplace le build legacy "pages-build-deployment" qui tourne sur d'anciennes
# actions Node.js 20 et émet l'avertissement de dépréciation.
#
# PRÉREQUIS (une seule fois) : Settings -> Pages -> Build and deployment ->
# Source = "GitHub Actions".

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Une seule exécution de déploiement à la fois, sans annuler celle en cours.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Configure Pages
        uses: actions/configure-pages@v6

      # VULN-007 : on ne publie que les fichiers du site dans un dossier dédié (_site),
      # au lieu de tout le dépôt. Exclut les docs internes, la config CI, les tests, etc.
      - name: Préparer le contenu du site
        run: |
          set -euo pipefail
          rm -rf _site
          mkdir -p _site
          cp -R index.html assets outils docs .nojekyll _site/

      - name: Empaqueter le contenu du site
        uses: actions/upload-pages-artifact@v5
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
