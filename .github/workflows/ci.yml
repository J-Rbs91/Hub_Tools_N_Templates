name: Contrôle & hygiène

# Qualité / hygiène du site statique : lint des workflows, hygiène des fichiers,
# validation HTML et vérification des liens. Aucun build (site HTML/CSS/JS pur).

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

# Économie de minutes Actions : un nouveau push sur la même réf annule le run en cours.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  actionlint:
    name: Lint des workflows
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: actionlint
        run: |
          set -euo pipefail
          # Version épinglée d'actionlint (évite l'exécution d'un script de la branche mobile main).
          ACTIONLINT_VERSION=1.7.7
          curl -sSfL -o download-actionlint.bash \
            "https://raw.githubusercontent.com/rhysd/actionlint/v${ACTIONLINT_VERSION}/scripts/download-actionlint.bash"
          bash download-actionlint.bash "${ACTIONLINT_VERSION}"
          ./actionlint -color

  hygiene:
    name: Hygiène des fichiers
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Vérifications hygiène (whitespace, CRLF, newline finale)
        run: |
          set -euo pipefail
          fail=0

          echo "== Espaces en fin de ligne (hors Markdown) =="
          if git grep -nIP ' +$' -- ':!*.md'; then
            echo "::error::Des lignes contiennent des espaces en fin de ligne."
            fail=1
          else
            echo "OK"
          fi

          echo "== Fins de ligne CRLF =="
          if git grep -lIP '\r$' -- .; then
            echo "::error::Des fichiers utilisent des fins de ligne CRLF (attendu : LF)."
            fail=1
          else
            echo "OK"
          fi

          echo "== Newline finale manquante =="
          while IFS= read -r f; do
            case "$f" in
              *.png|*.jpg|*.jpeg|*.gif|*.ico|*.webp|*.woff|*.woff2|*.pdf) continue ;;
            esac
            if [ -s "$f" ] && [ -n "$(tail -c1 "$f")" ]; then
              echo "::error file=$f::Newline finale manquante."
              fail=1
            fi
          done < <(git ls-files)
          [ "$fail" -eq 0 ] && echo "OK"

          exit "$fail"

  html-validate:
    name: Validation HTML
    runs-on: ubuntu-latest
    container: node:22
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: html-validate
        run: npx --yes html-validate "**/*.html"

  links:
    name: Vérification des liens
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: lychee
        uses: lycheeverse/lychee-action@8646ba30535128ac92d33dfc9133794bfdd9b411 # v2.8.0
        with:
          args: >-
            --no-progress
            --accept 200,206,403,429
            "./**/*.html"
            "./**/*.md"
          fail: true
