<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" role="img" aria-label="Hub d'outils">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="32" y2="32" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#175A92"/>
      <stop offset=".55" stop-color="#1F6FB2"/>
      <stop offset="1" stop-color="#2A86CE"/>
    </linearGradient>
  </defs>
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>
  <g fill="none" stroke="#fff" stroke-linecap="round" stroke-linejoin="round">
    <!-- rayons du hub (discrets) -->
    <path d="M16 16 V7 M16 16 H25 M16 16 V25 M16 16 H7" stroke-width="1" opacity=".4"/>
    <!-- cadran de l'horloge -->
    <circle cx="16" cy="16" r="9.4" stroke-width="1.6" opacity=".9"/>
    <!-- aiguilles (≈ 10 h 10, posture « positive ») -->
    <path d="M16 16 L21.9 12.6 M16 16 L11.6 13.1" stroke-width="1.8"/>
  </g>
  <!-- nœuds du hub, placés aux heures -->
  <g fill="#fff">
    <circle cx="16" cy="6.6" r="1.5"/>
    <circle cx="25.4" cy="16" r="1.5"/>
    <circle cx="16" cy="25.4" r="1.5"/>
    <circle cx="6.6" cy="16" r="1.5"/>
    <circle cx="16" cy="16" r="2.1"/>
  </g>
</svg>
